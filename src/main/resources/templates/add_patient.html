<!DOCTYPE html>
<html lang="en" >
<head>
    <meta charset="UTF-8">
    <title>Register a new patient</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <style>
        body{
            background-color:#EEF4FA;
        }
         h1{
            color:#1B3A5C;
            font-size: 40px;
        }
        p{
            color:#2776C6;
            padding: 5px;
        }
        .form-control{
            color:#2776C6;
        }
        .options{
            color:#2776C6;
        }
       .form-control::placeholder{
            color:#2776C6;
           opacity:1;
        }
       input{
           margin-bottom: 5px;
       }
       #save{
           color:#2776C6;
           background-color:#EEF4FA;
           border: 1px solid #2776C6;
       }

    </style>
</head>
<body>
<section class="text-center">
    <h1>Register a new patient</h1>
</section>

    <div class="container">
        <form id="form">
            <label for="fName">patient firstname</label>
            <input  name="fName" type="text"  class="form-control" placeholder="patient name" id="fName">
            <label for="sName">patient surname</label>
            <input  name="sName" type="text" class="form-control" placeholder="patient surname" id="sName">
            <label>birthdate</label>
            <input name="birth" type="date" class="form-control" id="birth">
            <label for="gender">gender</label>
            <select name="gender" class="form-control" id="gender">
                <option class="options" value="male">male</option>
                <option class="options" value="female">female</option>
                <option class="options" value="other">other</option>
            </select>
            <label for="ssn">Social security number</label>
            <input name="ssn" type="text" inputmode="numeric" class="form-control" id="ssn" placeholder="social security number">
            <button type="submit" class="btn btn-outline-primary" id="save" value="Save"></button>
        </form>
    </div>
    <div id="statusBox"></div>
    <script src="/js/addPatient.js"></script>

</body>
</html>
