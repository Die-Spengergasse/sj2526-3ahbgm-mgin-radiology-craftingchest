<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Register a new patient</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <style>
        body{
            background-color:#EEF4FA;
        }
         h1{
            color:#1B3A5C;
            font-size: 40px;
        }
        p{
            color:#2776C6;

        }
        .form-control{
            color:#2776C6;
        }
        .options{
            color:#2776C6;
        }
       .form-control::placeholder{
            color:#2776C6;
           opacity:1;
        }
       input{
           margin-bottom: 15px;
       }
       #save{
           color:#2776C6;
           background-color:#EEF4FA;
           border: 1px solid #2776C6;
       }

    </style>
</head>
<body>
<section class="text-center">
    <h1>Register a new patient</h1>
</section>

    <div class="container">
        <form>
            <p>patient firstname</p>
            <input   type="text"  class="form-control" placeholder="patient name">
            <p>patient surname</p>
            <input  type="text" class="form-control" placeholder="patient surname">
            <p>birth date</p>
            <input type="date" class="form-control">
            <p>gender</p>
            <select class="form-control">
                <option class="options" value="male">male</option>
                <option class="options" value="female">female</option>
                <option class="options" value="other">other</option>
            </select>
            <p>Social security number</p>
            <input type="number" class="form-control" placeholder="social security number">
            <input type="submit" class="form-control" id="save" value="Save">
        </form>
    </div>
</body>
</html>
