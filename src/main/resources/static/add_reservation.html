<h1> Adding a new Reservation</h1>
 <form id="reservationForm">
     <label for="Patients">Select the Patient you want to book</label>
     <select name="Patients" class="form-control" id="Patients">
     </select>
        <label for="Devices">Select the Device you want to book</label>
        <select name="Devices" class="form-control" id="Devices">
        </select>
     <label for="reservationDate"> type in a date that you want to book</label>
     <input type="date" class="form-control" name="reservationDate" id="reservationDate">
     <label for="Bodyregion">Body Region</label>
     <input type="text" class="form-control" name="Bodyregion" id="Bodyregion">
        <label for="Comments">Comments</label>
        <input type="text" class="form-control" name="Comments" id="Comments">
     <button type="submit" class="btn btn-outline-primary" id="save" value="Save"></button>
 </form>
